<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DugoutIQ — Live Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --navy:#14204A; --navy2:#1D2D5C; --deep:#0A1128; --royal:#134A8E; --line:#2B5AA0;
         --powder:#A9C5E8; --muted:#5F79AF; --red:#E8291C; --amber:#F5C518; --white:#F5F7FA; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        background:
          radial-gradient(700px 380px at 20% -8%, rgba(27,87,160,.55), transparent 60%),
          radial-gradient(600px 340px at 95% 4%, rgba(245,197,24,.07), transparent 55%),
          #0A1128;
        color:var(--white); min-height:100vh; padding:0 0 52px; }
  .wrap{ max-width:520px; margin:0 auto; padding:0 14px; }

  /* ---- sticky glass scoreboard ---- */
  .sticky{ position:sticky; top:0; z-index:20;
           background:rgba(10,17,40,.72); backdrop-filter:blur(16px) saturate(1.3);
           -webkit-backdrop-filter:blur(16px) saturate(1.3);
           box-shadow:0 14px 34px rgba(0,0,0,.45); }
  .topbar{ max-width:520px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:10px 16px 0; }
  .brand{ display:flex; align-items:center; gap:7px; font-family:"Saira Condensed",sans-serif; font-weight:800; font-size:14px; letter-spacing:.14em; color:var(--powder); }
  .brand img{ height:22px; }
  .live{ font-family:"IBM Plex Mono",monospace; font-size:10.5px; font-weight:600; display:flex; align-items:center; gap:6px; color:var(--powder); letter-spacing:.06em; }
  .dot{ width:7px; height:7px; border-radius:50%; background:#3ad07a; box-shadow:0 0 0 0 rgba(58,208,122,.6); animation:p 1.6s infinite; }
  .dot.stale{ background:#8b95ad; animation:none; box-shadow:none; }
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(58,208,122,.55)}70%{box-shadow:0 0 0 7px rgba(58,208,122,0)}100%{box-shadow:0 0 0 0 rgba(58,208,122,0)}}

  .scorebar{ max-width:520px; margin:0 auto; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:14px; padding:10px 16px 14px; }
  .sb-team{ display:flex; align-items:center; gap:10px; min-width:0; }
  .sb-team > div:nth-of-type(1){ flex:1 1 auto; min-width:0; }
  .sb-team.home{ flex-direction:row-reverse; text-align:right; }
  .tlogo{ height:44px; width:44px; object-fit:contain; border-radius:12px; background:rgba(255,255,255,.08);
          padding:3px; flex:0 0 auto; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12), 0 6px 16px rgba(0,0,0,.35); }
  .sb-nm{ font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:15px; letter-spacing:.08em;
          text-transform:uppercase; color:var(--powder); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sb-run{ font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:clamp(30px,9vw,40px); line-height:1;
           text-shadow:0 4px 18px rgba(0,0,0,.45); flex:0 0 auto; }
  .bat .sb-nm{ color:var(--white); }
  .bat .sb-run{ color:var(--amber); text-shadow:0 0 26px rgba(245,197,24,.35), 0 4px 18px rgba(0,0,0,.45); }
  .sb-nm::after{ content:""; display:block; height:3px; border-radius:2px; background:transparent; margin-top:3px; }
  .bat .sb-nm::after{ background:var(--amber); box-shadow:0 0 10px rgba(245,197,24,.7); }
  .home.bat .sb-nm::after{ margin-left:auto; }
  .sb-mid{ text-align:center; font-family:"IBM Plex Mono",monospace; color:var(--powder); padding:0 6px; min-width:44px; }
  .sb-half{ font-size:15px; color:var(--amber); line-height:1; }
  .sb-inn{ font-family:"Saira Condensed",sans-serif; font-size:24px; font-weight:700; color:var(--white); line-height:1.15; }
  .sb-final{ font-size:12px; letter-spacing:.22em; color:var(--amber); font-weight:600; }

  /* ---- elevated surfaces, no outlines ---- */
  .card{ background:linear-gradient(180deg, rgba(36,54,104,.72), rgba(20,32,74,.92));
         border:1px solid rgba(255,255,255,.06); border-radius:20px; margin-top:14px; padding:18px;
         box-shadow:0 28px 56px -16px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05); }
  .vidcard{ padding:0; overflow:hidden; }
  .vidwrap{ position:relative; width:100%; aspect-ratio:16/9; background:#000; }
  .vidwrap iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:block; }
  .watchlink{ display:flex; align-items:center; justify-content:center; gap:6px; text-decoration:none;
    font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:17px; letter-spacing:.06em;
    color:#0A1128; background:linear-gradient(180deg,#FFD84D,var(--amber)); padding:16px;
    box-shadow:0 10px 30px rgba(245,197,24,.25); }
  .watchlink:active{ filter:brightness(.94); }

  /* ---- field view ---- */
  .field{ display:flex; align-items:center; gap:8px; }
  .fld-l{ flex:1; display:flex; flex-direction:column; gap:11px; }
  .crow{ display:flex; align-items:center; gap:7px; }
  .crow span{ font-family:"IBM Plex Mono",monospace; font-size:13px; color:var(--muted); width:14px; }
  .crow i{ width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,.07); }
  .crow i.on{ background:var(--amber); box-shadow:0 0 12px rgba(245,197,24,.75); }
  .crow.o i.on{ background:var(--red); box-shadow:0 0 12px rgba(232,41,28,.7); }
  .dia{ width:198px; height:138px; flex:0 0 auto; filter:drop-shadow(0 10px 22px rgba(0,0,0,.45)); }
  .dia .rn{ font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:13px; letter-spacing:.03em;
            fill:var(--white); stroke:rgba(10,17,40,.85); stroke-width:3px; paint-order:stroke; }
  .dia .bs{ fill:rgba(255,255,255,.08); stroke:rgba(169,197,232,.5); stroke-width:1.4; }
  .dia .bs.on{ fill:var(--amber); stroke:var(--amber); filter:drop-shadow(0 0 8px rgba(245,197,24,.9)); }
  .dia .hp{ fill:var(--white); }
  .dia .ln{ fill:none; stroke:rgba(43,90,160,.65); stroke-width:1.6; }
  .fld-r{ flex:1; text-align:right; font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.14em; color:var(--muted); }
  .fld-r b{ display:block; font-family:"Saira Condensed",sans-serif; font-size:28px; letter-spacing:.02em; color:var(--white); font-weight:700; margin-top:3px; }

  .strip{ margin-top:14px; padding-top:12px; border-top:1px solid rgba(255,255,255,.07);
          display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; font-size:13px; color:var(--powder); }
  .strip b{ color:var(--white); font-weight:600; }
  .lastplay{ margin-top:13px; background:rgba(10,17,40,.65); border-radius:12px;
             padding:11px 14px; font-family:"IBM Plex Mono",monospace; font-size:13px; color:var(--white); text-align:center;
             box-shadow:inset 0 1px 4px rgba(0,0,0,.35); }

  /* ---- linescore ---- */
  h3{ margin:0 0 12px; font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:12.5px;
      letter-spacing:.22em; text-transform:uppercase; color:var(--muted); }
  table.ls{ width:100%; border-collapse:collapse; font-family:"IBM Plex Mono",monospace; font-size:13.5px; }
  .ls th{ color:var(--muted); font-weight:500; padding:3px 5px 7px; text-align:center; font-size:11.5px; }
  .ls td{ padding:7px 5px; text-align:center; color:var(--powder); font-family:"Saira Condensed",sans-serif; font-weight:600; font-size:15px; }
  .ls tr + tr td{ border-top:1px solid rgba(255,255,255,.06); }
  .ls td.tm{ font-family:"Saira Condensed",sans-serif; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
             text-align:left; font-size:14px; color:var(--white); }
  .ls .tot{ color:var(--amber); font-weight:700; font-size:17px; }

  /* ---- play-by-play: timeline ---- */
  .feed{ position:relative; padding-left:22px; }
  .feed::before{ content:""; position:absolute; left:5px; top:6px; bottom:6px; width:2px;
                 background:linear-gradient(180deg, rgba(43,90,160,.55), rgba(43,90,160,.12)); border-radius:1px; }
  .inn-chip{ position:relative; font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:12px;
             letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin:16px 0 10px; }
  .inn-chip::before{ content:""; position:absolute; left:-21px; top:4px; width:8px; height:8px; border-radius:50%;
                     background:var(--royal); box-shadow:0 0 0 3px rgba(19,74,142,.3); }
  .pl{ position:relative; padding:0 0 16px; }
  .pl::before{ content:""; position:absolute; left:-22px; top:5px; width:10px; height:10px; border-radius:50%;
               background:var(--line); box-shadow:0 0 0 3px rgba(43,90,160,.22); }
  .pl.scored::before{ background:var(--amber); box-shadow:0 0 0 3px rgba(245,197,24,.25), 0 0 12px rgba(245,197,24,.8); }
  .pl .b{ font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:16.5px; letter-spacing:.03em; }
  .pl .r{ font-size:14px; color:var(--powder); margin-top:2px; line-height:1.45; }
  .pl.scored .r{ color:var(--amber); }
  .pl .q{ font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:.09em; }
  .pl.ev .r{ margin:0; color:var(--muted); font-size:13px; }
  .pl.ev::before{ width:8px; height:8px; left:-21px; background:transparent; border:2px solid var(--line); box-shadow:none; }

  .msg{ text-align:center; color:var(--powder); padding:48px 10px; }
  .foot{ text-align:center; font-size:11px; color:var(--muted); margin-top:26px; letter-spacing:.04em; }
</style>
</head>
<body>

<div class="sticky">
  <div class="topbar">
    <div class="brand"><img src="logo.png" alt="" onerror="this.style.display='none'"/>DugoutIQ LIVE</div>
    <div class="live"><span class="dot" id="dot"></span><span id="status">Connecting…</span></div>
  </div>
  <div class="scorebar" id="scorebar" hidden>
    <div class="sb-team" id="sb-away">
      <img class="tlogo" id="al" hidden /><div><div class="sb-nm" id="an"></div></div><div class="sb-run" id="ar">0</div>
    </div>
    <div class="sb-mid" id="sb-mid"></div>
    <div class="sb-team home" id="sb-home">
      <img class="tlogo" id="hl" hidden /><div><div class="sb-nm" id="hn"></div></div><div class="sb-run" id="hr">0</div>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="content"><div class="msg">Loading the game…</div></div>
  <div class="foot">Live view · updates automatically · powered by DugoutIQ</div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const code = new URLSearchParams(location.search).get("code") || new URLSearchParams(location.search).get("g") || "";
  let lastUpdated = 0;

  function esc(t){ return String(t).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function dots(n,total,cls){ let s=""; for(let i=0;i<total;i++) s+=`<i class="${i<n?'on':''}"></i>`; return `<div class="crow ${cls||''}"><span>${cls==='o'?'O':cls==='s'?'S':'B'}</span>${s}</div>`; }

  function safeVideo(v){
    if(!v) return null;
    if(typeof v === "string") v = { type:"", mode:"embed", src:v };
    let u; try{ u=new URL(v.src); }catch(e){ return null; }
    if(u.protocol!=="https:") return null;
    const h=u.hostname.replace(/^www\./,"").toLowerCase();
    const ok=(list)=>list.some(d=>h===d||h.endsWith("."+d));
    const allowed=["youtube-nocookie.com","youtube.com","streamyard.com","facebook.com","instagram.com","tiktok.com"];
    if(!ok(allowed)) return null;
    return { mode: v.mode==="link" ? "link" : "embed", src:u.href, type:v.type||"" };
  }
  function videoBlock(v){
    if(!v) return "";
    if(v.mode==="embed")
      return `<div class="card vidcard"><div class="vidwrap"><iframe src="${v.src}" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen frameborder="0"></iframe></div></div>`;
    const names={youtube:"YouTube",facebook:"Facebook",streamyard:"StreamYard",instagram:"Instagram",tiktok:"TikTok"};
    return `<a class="card watchlink" href="${v.src}" target="_blank" rel="noopener">▶&nbsp; Watch live on ${names[v.type]||"the stream"} ↗</a>`;
  }

  function scorebar(s){
    $("scorebar").hidden = false;
    const battingAway = s.half === "top" && !s.over;
    const battingHome = s.half !== "top" && !s.over;
    $("sb-away").classList.toggle("bat", battingAway);
    $("sb-home").classList.toggle("bat", battingHome);
    $("an").textContent = s.away.abbr || s.away.name; $("hn").textContent = s.home.abbr || s.home.name;
    $("ar").textContent = s.away.runs; $("hr").textContent = s.home.runs;
    const setLogo = (id, src) => { const el=$(id); if(src){ el.src=src; el.hidden=false; } else el.hidden=true; };
    setLogo("al", s.away.logo); setLogo("hl", s.home.logo);
    $("sb-mid").innerHTML = s.over
      ? `<div class="sb-final">FINAL</div>`
      : `<div class="sb-half">${s.half==="top"?"▲":"▼"}</div><div class="sb-inn">${s.inning}</div>`;
  }

  function rname(x){ return (x && typeof x === "object" && x.n) ? String(x.n).slice(0,12) : ""; }
  function diamond(b){
    const on=(x)=>x?'on':'';
    const lbl=(x,y,a,n)=> n?`<text class="rn" x="${x}" y="${y}" text-anchor="${a}">${esc(n)}</text>`:"";
    return `<svg class="dia" viewBox="0 0 200 140" aria-label="Bases">
      <path class="ln" d="M100 120 L55 75 L100 30 L145 75 Z"/>
      <rect class="bs ${on(b.second)}" x="93" y="23" width="14" height="14" rx="2" transform="rotate(45 100 30)"/>
      <rect class="bs ${on(b.first)}"  x="138" y="68" width="14" height="14" rx="2" transform="rotate(45 145 75)"/>
      <rect class="bs ${on(b.third)}"  x="48" y="68" width="14" height="14" rx="2" transform="rotate(45 55 75)"/>
      <polygon class="hp" points="93,116 107,116 107,123 100,129 93,123"/>
      ${lbl(100,16,"middle",rname(b.second))}
      ${lbl(156,79,"start",rname(b.first))}
      ${lbl(44,79,"end",rname(b.third))}
    </svg>`;
  }

  function feed(log){
    if(!log || !log.length) return "";
    const items=[]; let lastKey="";
    for(let i=log.length-1;i>=0;i--){
      const e=log[i];
      const key=(e.h||"")+e.i;
      if(key!==lastKey){ items.push(`<div class="inn-chip">${e.h==="top"?"Top":"Bottom"} ${e.i}</div>`); lastKey=key; }
      if(e.p){
        if(!e.r) continue;
        const scored=/scores|home run|walk-off|grand slam/i.test(e.r);
        items.push(`<div class="pl ${scored?'scored':''}"><div class="b">${esc(e.b||"")}</div><div class="r">${esc(e.r)}</div>${e.q?`<div class="q">${esc(e.q)}</div>`:""}</div>`);
      } else if(e.t){
        items.push(`<div class="pl ev"><div class="r">${esc(e.t)}</div></div>`);
      }
    }
    if(!items.length) return "";
    return `<div class="card"><h3>Play by play</h3><div class="feed">${items.join("")}</div></div>`;
  }

  function render(s){
    scorebar(s);
    const ls = (s.linescore||[]).map((r,i)=>`<th>${i+1}</th>`).join("");
    const lsA = (s.linescore||[]).map(r=>`<td>${r.away==null?"":r.away}</td>`).join("");
    const lsH = (s.linescore||[]).map(r=>`<td>${r.home==null?"·":r.home}</td>`).join("");
    const vid = videoBlock(safeVideo(s.video));
    const rhe = (t)=>`<td class="tot">${t.runs}</td><td>${t.hits!=null?t.hits:""}</td><td>${t.errors!=null?t.errors:""}</td>`;
    $("content").innerHTML = `
      ${vid}
      <div class="card">
        <div class="field">
          <div class="fld-l">${dots(s.balls,3,'')}${dots(s.strikes,2,'s')}${dots(s.outs,2,'o')}</div>
          ${diamond(s.bases||{})}
          <div class="fld-r">PITCHES<b>${s.pitches!=null?s.pitches:0}</b></div>
        </div>
        ${s.lastPlay?`<div class="lastplay">${esc(s.lastPlay)}</div>`:""}
        <div class="strip">
          <span>${s.batter?`At bat: <b>${esc(s.batter)}</b>`:""}${s.onDeck?` · On deck: ${esc(s.onDeck)}`:""}</span>
          <span>${s.pitcher?`Pitching: <b>${esc(s.pitcher)}</b>`:""}</span>
        </div>
      </div>
      <div class="card">
        <h3>Linescore</h3>
        <table class="ls">
          <tr><th></th>${ls}<th>R</th><th>H</th><th>E</th></tr>
          <tr><td class="tm">${esc(s.away.abbr || s.away.name)}</td>${lsA}${rhe(s.away)}</tr>
          <tr><td class="tm">${esc(s.home.abbr || s.home.name)}</td>${lsH}${rhe(s.home)}</tr>
        </table>
      </div>
      ${feed(s.log)}
    `;
  }

  async function poll(){
    if(!code){ $("content").innerHTML='<div class="msg">No game code in the link.</div>'; return; }
    try{
      const r = await fetch(`/.netlify/functions/game?code=${encodeURIComponent(code)}`, {cache:"no-store"});
      if(r.status===404){ $("status").textContent="Waiting for game…"; $("dot").classList.add("stale"); return; }
      const d = await r.json();
      if(d.ok && d.snap){ lastUpdated = d.snap.updated || Date.now(); render(d.snap); }
    }catch(e){ /* keep last view; mark stale below */ }
    tickStatus();
  }
  function tickStatus(){
    const dot=$("dot"), st=$("status");
    if(!lastUpdated){ return; }
    const ago = Math.round((Date.now()-lastUpdated)/1000);
    if(ago>20){ dot.classList.add("stale"); st.textContent="Paused — reopen to refresh"; }
    else { dot.classList.remove("stale"); st.textContent = "LIVE · "+(ago<3?"just now":ago+"s ago"); }
  }
  poll(); setInterval(poll, 4000); setInterval(tickStatus, 1000);
</script>
</body>
</html>
