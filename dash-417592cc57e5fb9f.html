<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>DugoutIQ — Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --deep:#0A1128; --navy:#14204A; --navy2:#1D2D5C; --line:#2B5AA0; --powder:#A9C5E8;
         --muted:#5F79AF; --amber:#F5C518; --green:#3ad07a; --white:#F5F7FA; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        background:radial-gradient(700px 380px at 20% -8%, rgba(27,87,160,.5), transparent 60%), #0A1128;
        color:var(--white); min-height:100vh; padding:20px 14px 60px; }
  .wrap{ max-width:640px; margin:0 auto; }
  h1{ font-family:"Saira Condensed",sans-serif; font-weight:800; letter-spacing:.04em; font-size:22px; margin:0 0 2px; }
  .sub{ color:var(--muted); font-size:12px; margin-bottom:18px; }
  .gate{ display:flex; gap:8px; margin-bottom:18px; }
  .gate input{ flex:1; padding:11px 12px; border-radius:10px; border:1px solid var(--line);
               background:#0E1A3A; color:#fff; font-size:14px; }
  .gate button, .refresh{ font-family:"Saira Condensed",sans-serif; font-weight:700; letter-spacing:.04em;
    background:linear-gradient(180deg,#FFD84D,var(--amber)); color:var(--navy); border:0; border-radius:10px;
    padding:11px 16px; cursor:pointer; font-size:14px; }
  .cards{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:18px; }
  .stat{ background:linear-gradient(180deg,var(--navy2),var(--navy)); border:1px solid rgba(255,255,255,.06);
         border-radius:14px; padding:14px 8px; text-align:center; box-shadow:0 14px 30px -16px rgba(0,0,0,.6); }
  .stat b{ display:block; font-family:"Saira Condensed",sans-serif; font-size:30px; line-height:1; color:var(--amber); }
  .stat.live b{ color:var(--green); }
  .stat span{ display:block; margin-top:5px; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--powder); }
  @media (max-width:560px){ .cards{ grid-template-columns:repeat(3,1fr); } }
  .bar{ display:flex; align-items:center; justify-content:space-between; margin:0 0 10px; }
  .bar h2{ font-family:"Saira Condensed",sans-serif; font-size:13px; letter-spacing:.14em; text-transform:uppercase;
           color:var(--muted); margin:0; }
  .g{ background:var(--navy); border:1px solid rgba(255,255,255,.05); border-radius:12px; padding:11px 13px;
      margin-bottom:8px; display:flex; align-items:center; gap:12px; }
  .g .dot{ width:9px; height:9px; border-radius:50%; background:var(--muted); flex:0 0 auto; }
  .g.live .dot{ background:var(--green); box-shadow:0 0 10px rgba(58,208,122,.8); }
  .g .mid{ flex:1; min-width:0; }
  .g .t{ font-family:"Saira Condensed",sans-serif; font-weight:700; font-size:15px; letter-spacing:.02em; }
  .g .s{ color:var(--amber); }
  .g .meta{ font-size:11px; color:var(--muted); margin-top:1px; }
  .g .code{ font-family:"Saira Condensed",sans-serif; font-size:13px; letter-spacing:.12em; color:var(--powder);
            background:#0E1A3A; border-radius:6px; padding:3px 8px; flex:0 0 auto; }
  .msg{ color:var(--powder); text-align:center; padding:40px 0; }
  .err{ color:#E8915A; }
  a.link{ color:var(--powder); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>DugoutIQ · Creator</h1>
  <div class="sub" id="sub">Private dashboard — live games &amp; usage</div>

  <div class="gate" id="gate">
    <input id="tok" type="password" placeholder="Access token" autocomplete="off" />
    <button id="go">Open</button>
  </div>

  <div id="body" hidden>
    <div class="cards">
      <div class="stat live"><b id="s-live">–</b><span>Live now</span></div>
      <div class="stat"><b id="s-today">–</b><span>Today</span></div>
      <div class="stat"><b id="s-week">–</b><span>7 days</span></div>
      <div class="stat"><b id="s-total">–</b><span>Games</span></div>
      <div class="stat"><b id="s-act">–</b><span>Activations</span></div>
    </div>
    <div class="bar">
      <h2>Games</h2>
      <button class="refresh" id="refresh">Refresh</button>
    </div>
    <div id="list"><div class="msg">Loading…</div></div>
  </div>
  <div id="gatemsg"></div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let token = "";

  function ago(ms){
    const s = Math.round((Date.now()-ms)/1000);
    if (s < 60) return s+"s ago";
    const m = Math.round(s/60); if (m < 60) return m+"m ago";
    const h = Math.round(m/60); if (h < 24) return h+"h ago";
    return Math.round(h/24)+"d ago";
  }
  function esc(t){ return String(t).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  async function load(){
    try{
      const r = await fetch("/.netlify/functions/admin?token="+encodeURIComponent(token));
      if (r.status === 403){ $("gatemsg").innerHTML = '<div class="msg err">Wrong token.</div>'; return; }
      const d = await r.json();
      if (!d.ok) throw new Error(d.message || "Error");
      $("gate").hidden = true; $("gatemsg").innerHTML = ""; $("body").hidden = false;
      try{ localStorage.setItem("dq_dash", token); }catch(e){}
      $("s-live").textContent = d.stats.live;
      $("s-today").textContent = d.stats.today;
      $("s-week").textContent = d.stats.week;
      $("s-total").textContent = d.stats.total;
      $("s-act").textContent = d.stats.activations || 0;
      if (!d.games.length){ $("list").innerHTML = '<div class="msg">No games in the store yet.</div>'; return; }
      $("list").innerHTML = d.games.map((g) => `
        <div class="g ${g.live?'live':''}">
          <span class="dot"></span>
          <div class="mid">
            <div class="t">${esc(g.away)} <span class="s">${g.sA}–${g.sH}</span> ${esc(g.home)}</div>
            <div class="meta">${g.over?'Final':(g.half==='top'?'▲':'▼')+' '+g.inning} · ${ago(g.updated)}${g.av?' · v'+esc(g.av):''}</div>
          </div>
          <span class="code">${esc(g.code)}</span>
        </div>`).join("");
    }catch(e){
      $("gatemsg").innerHTML = '<div class="msg err">'+esc(e.message||"Failed to load")+'</div>';
    }
  }

  $("go").onclick = () => { token = $("tok").value.trim(); if (token) load(); };
  $("tok").addEventListener("keydown", (e) => { if (e.key === "Enter") $("go").click(); });
  $("refresh").onclick = load;
  // remember the token on this device only
  try{ const saved = localStorage.getItem("dq_dash"); if (saved){ token = saved; load(); } }catch(e){}
</script>
</body>
</html>
